<!-- ✅ index.html (Telegram WebApp) — загрузишь в GitHub Pages /grand-cru/
     Открытие карточки: https://tahirovdd-lang.github.io/grand-cru/?item=paddy_07
     Отправка в бота: Telegram.WebApp.sendData(JSON.stringify(payload))
-->
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
<title>Grand Cru — карточка</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#8B0E13;
  --card:#ffffff;
  --text:#161616;
  --muted:rgba(0,0,0,.62);
  --stroke:rgba(0,0,0,.08);
  --shadow:0 18px 44px rgba(0,0,0,.22);
  --r:22px;
  --r2:18px;
  --accent:#8B0E13;
  --safeT: env(safe-area-inset-top, 0px);
  --safeB: env(safe-area-inset-bottom, 0px);
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  margin:0;
  font-family:'Montserrat',system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(0,0,0,.08)), var(--bg);
  color:#fff;
  padding: calc(var(--safeT) + 12px) 12px calc(var(--safeB) + 18px);
  overflow-x:hidden;
}
.wrap{max-width:860px;margin:0 auto;}

.topbar{
  display:flex; align-items:center; justify-content:space-between;
  gap:10px;
  margin-bottom:12px;
}
.brand{
  display:flex; align-items:center; gap:10px;
  min-width:0;
}
.logo{
  width:44px;height:44px;border-radius:14px;
  background:rgba(255,255,255,.10);
  border:1px solid rgba(255,255,255,.18);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
.logo img{width:100%;height:100%;object-fit:contain;padding:6px;}
.brandTxt{min-width:0;}
.brandName{
  font-family: Georgia, "Times New Roman", Times, serif;
  font-weight:800; letter-spacing:.5px;
  font-size:22px; line-height:1;
}
.brandSub{
  margin-top:3px;
  font-weight:900;
  font-size:11px;
  letter-spacing:1.5px;
  opacity:.9;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.actions{
  display:flex; gap:10px; align-items:center;
}
.iconBtn{
  width:44px;height:44px;border-radius:16px;
  border:1px solid rgba(255,255,255,.18);
  background:rgba(255,255,255,.12);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  box-shadow: 0 12px 22px rgba(0,0,0,.14);
}
.iconBtn:active{transform:scale(.98);}
.iconBtn span{font-size:18px; line-height:1;}
.searchWrap{
  display:none;
  margin: 10px 0 12px;
  background:rgba(255,255,255,.10);
  border:1px solid rgba(255,255,255,.18);
  border-radius:18px;
  padding:10px;
}
.searchWrap.show{display:flex; gap:10px; align-items:center;}
.searchInput{
  flex:1;
  border:none; outline:none;
  background:transparent;
  color:#fff;
  font-weight:800;
  font-size:14px;
}
.searchInput::placeholder{color:rgba(255,255,255,.75);}
.clearBtn{
  width:36px;height:36px;border-radius:14px;
  border:1px solid rgba(255,255,255,.18);
  background:rgba(0,0,0,.12);
  color:#fff;
  font-weight:900;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
}

.card{
  background:rgba(255,255,255,.94);
  color:var(--text);
  border:1px solid rgba(255,255,255,.22);
  box-shadow: var(--shadow);
  border-radius: var(--r);
  overflow:hidden;
}

.cardHead{
  padding:14px 16px;
  border-bottom:1px solid rgba(0,0,0,.06);
  display:flex; align-items:center; justify-content:space-between; gap:10px;
}
.cardTitle{
  font-weight:900;
  font-size:16px;
  line-height:1.1;
  min-width:0;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.badge{
  padding:8px 10px;
  border-radius:999px;
  border:1px solid rgba(0,0,0,.10);
  background:rgba(0,0,0,.03);
  font-weight:900;
  font-size:12px;
  white-space:nowrap;
}

.cardBody{
  display:flex;
  gap:0;
}
.left{
  flex:1.05;
  padding:16px;
  border-right:1px solid rgba(0,0,0,.06);
  display:flex; align-items:center; justify-content:center;
  background:#fff;
}
.prodImg{
  width:100%;
  max-height:70vh;
  object-fit:contain;
  border-radius:18px;
  background:#fff;
}
.right{
  flex:1;
  padding:16px;
}
.name{
  font-weight:900;
  font-size:22px;
  line-height:1.12;
  margin-bottom:8px;
}
.desc{
  font-weight:800;
  color:rgba(0,0,0,.78);
  line-height:1.35;
  white-space:pre-line;
}
.metaRow{
  display:flex; flex-wrap:wrap; gap:10px;
  margin:12px 0 12px;
}
.chip{
  padding:8px 10px;
  border-radius:999px;
  border:1px solid rgba(0,0,0,.10);
  background:rgba(0,0,0,.03);
  font-weight:900;
  font-size:12px;
}
.priceRow{
  display:flex; align-items:flex-end; justify-content:space-between; gap:12px;
  margin-top:10px;
}
.price{
  font-weight:900;
  font-size:22px;
  color:var(--accent);
}
.price small{font-size:12px; font-weight:900; opacity:.85; margin-left:6px;}
.counter{
  display:flex; align-items:center; gap:10px;
}
.cBtn{
  width:40px;height:40px;border-radius:999px;
  border:1px solid rgba(0,0,0,.10);
  background:#fff;
  font-weight:900;
  font-size:18px;
  cursor:pointer;
  box-shadow:0 10px 20px rgba(0,0,0,.10);
}
.cBtn:active{transform:scale(.98);}
.qty{
  min-width:28px;
  text-align:center;
  font-weight:900;
  font-size:16px;
}

.footerBtns{
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:10px;
  padding:14px 16px 16px;
  border-top:1px solid rgba(0,0,0,.06);
  background:rgba(0,0,0,.02);
}
.btn{
  padding:14px 14px;
  border-radius:18px;
  border:1px solid rgba(0,0,0,.10);
  font-weight:900;
  cursor:pointer;
  background:#fff;
  color:var(--accent);
  box-shadow:0 14px 26px rgba(0,0,0,.12);
}
.btn:active{transform:scale(.99);}
.btn.primary{
  background:var(--accent);
  color:#fff;
  border-color:rgba(0,0,0,.05);
}
.btn.full{
  grid-column:1/-1;
}

.toast{
  position:fixed;
  left:12px; right:12px; bottom: calc(var(--safeB) + 12px);
  max-width:860px;
  margin:0 auto;
  background:rgba(0,0,0,.78);
  color:#fff;
  border:1px solid rgba(255,255,255,.16);
  border-radius:18px;
  padding:12px 14px;
  font-weight:900;
  opacity:0;
  transform: translateY(10px);
  pointer-events:none;
  transition:.18s;
}
.toast.show{opacity:1; transform:translateY(0);}

@media (max-width:760px){
  .cardBody{flex-direction:column;}
  .left{border-right:none;border-bottom:1px solid rgba(0,0,0,.06);}
  .prodImg{max-height:52vh;}
  .footerBtns{grid-template-columns:1fr;}
}
</style>
</head>

<body>
<div class="wrap">

  <div class="topbar">
    <div class="brand">
      <div class="logo">
        <img src="images/logo.png" onerror="this.style.display='none'" alt="Grand Cru">
      </div>
      <div class="brandTxt">
        <div class="brandName">Grand Cru</div>
        <div class="brandSub">FINE WINE &amp; SPIRITS</div>
      </div>
    </div>

    <div class="actions">
      <div class="iconBtn" onclick="toggleSearch()" title="Поиск"><span>🔎</span></div>
      <div class="iconBtn" onclick="contactManager()" title="Связаться"><span>💬</span></div>
    </div>
  </div>

  <div class="searchWrap" id="searchWrap">
    <input class="searchInput" id="searchInput" placeholder="Поиск по товарам..." oninput="searchProducts()">
    <div class="clearBtn" onclick="clearSearch()">✖</div>
  </div>

  <div class="card">
    <div class="cardHead">
      <div class="cardTitle" id="catTitle">Карточка товара</div>
      <div class="badge" id="badge">Виски</div>
    </div>

    <div class="cardBody">
      <div class="left">
        <img class="prodImg" id="prodImg" src="" alt="">
      </div>

      <div class="right">
        <div class="name" id="name">—</div>
        <div class="metaRow" id="metaRow"></div>
        <div class="desc" id="desc">—</div>

        <div class="priceRow">
          <div class="price"><span id="price">0</span><small>сум</small></div>

          <div class="counter">
            <button class="cBtn" onclick="chg(-1)">−</button>
            <div class="qty" id="qty">1</div>
            <button class="cBtn" onclick="chg(1)">+</button>
          </div>
        </div>
      </div>
    </div>

    <div class="footerBtns">
      <button class="btn" onclick="sendToBot(false)">Добавить в корзину</button>
      <button class="btn primary" onclick="sendToBot(true)">Отправить заявку</button>
      <button class="btn full" onclick="openCatalog()">Открыть каталог</button>
    </div>
  </div>

</div>

<div class="toast" id="toast">✅</div>

<script>
/* ========= Telegram WebApp init ========= */
Telegram.WebApp.ready();
try{
  Telegram.WebApp.expand();
  Telegram.WebApp.disableVerticalSwipes?.();
  Telegram.WebApp.setHeaderColor?.('#8B0E13');
  Telegram.WebApp.setBackgroundColor?.('#8B0E13');
}catch(_){}

/* ========= настройки ========= */
const ADMIN_ID = 6013591658; // ✅ менеджер
const CATALOG_URL = "https://tahirovdd-lang.github.io/grand-cru/"; // твой каталог

/* ========= данные товаров (пример). Добавляй сюда свои =========
   id -> name, category, volume, abv, price, image, description
*/
const PRODUCTS = [
  {
    id: "paddy_07",
    name: "Paddy",
    category: "Виски",
    vol: "0.7 л",
    abv: "40%",
    price: 320000,
    img: "images/paddy.png", // положи картинку в папку images/
    desc:
`Классический ирландский виски с мягким и лёгким характером.
Сбалансированное сочетание сладких зерновых нот, ванили и лёгких оттенков мёда.
Идеально подходит для употребления в чистом виде, со льдом или в коктейлях.`
  },

  // ✅ добавь другие товары по такому же формату:
  // { id:"jameson_07", name:"Jameson", category:"Виски", vol:"0.7 л", abv:"40%", price:..., img:"images/jameson.png", desc:"..." },
];

/* ========= utils ========= */
const $ = (id)=>document.getElementById(id);
const toastEl = $("toast");
let toastTimer = null;

function showToast(text){
  toastEl.textContent = text || "✅";
  toastEl.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>toastEl.classList.remove("show"), 1100);
}
function fmtSum(n){
  const x = Number(n)||0;
  return x.toString().replace(/\B(?=(\d{3})+(?!\d))/g,' ');
}
function getParam(name){
  const url = new URL(window.location.href);
  return (url.searchParams.get(name) || "").trim();
}
function tgUser(){
  const u = Telegram.WebApp.initDataUnsafe?.user || {};
  return {
    id: u.id || "",
    username: u.username || "",
    first_name: u.first_name || "",
    last_name: u.last_name || ""
  };
}

/* ========= state ========= */
let current = PRODUCTS[0] || null;
let qty = 1;

/* ========= render ========= */
function renderProduct(p){
  current = p;
  qty = 1;

  $("catTitle").textContent = "Grand Cru • карточка товара";
  $("badge").textContent = p.category || "Товар";
  $("name").textContent = p.name || "—";

  $("price").textContent = fmtSum(p.price || 0);
  $("qty").textContent = String(qty);

  const img = $("prodImg");
  img.src = p.img || "images/logo.png";
  img.onerror = function(){ this.onerror=null; this.src="images/logo.png"; };

  const meta = $("metaRow");
  meta.innerHTML = "";
  if(p.vol) meta.innerHTML += `<div class="chip">Объём: ${escapeHtml(p.vol)}</div>`;
  if(p.abv) meta.innerHTML += `<div class="chip">Крепость: ${escapeHtml(p.abv)}</div>`;
  meta.innerHTML += `<div class="chip">Цена: ${fmtSum(p.price||0)} сум</div>`;

  $("desc").textContent = p.desc || "";
}
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

/* ========= counter ========= */
function chg(delta){
  qty = Math.max(1, Math.min(999, qty + (Number(delta)||0)));
  $("qty").textContent = String(qty);
}

/* ========= actions ========= */
function openCatalog(){
  try{ Telegram.WebApp.openLink(CATALOG_URL); }
  catch(_){ window.location.href = CATALOG_URL; }
}

function contactManager(){
  const url = `https://t.me/user?id=${ADMIN_ID}`;
  try{ Telegram.WebApp.openLink(url); }
  catch(_){ window.open(url, "_blank"); }
}

/* sendData payload:
   - add_to_cart: добавили позицию
   - request: отправить заявку
*/
function sendToBot(isRequest){
  if(!current){
    alert("Нет товара");
    return;
  }

  const u = tgUser();

  const payload = {
    action: isRequest ? "request" : "add_to_cart",
    brand: "GRAND CRU",
    item: {
      id: current.id,
      name: current.name,
      category: current.category,
      vol: current.vol,
      abv: current.abv,
      price: current.price,
      qty: qty
    },
    tg: u,
    ts: Date.now()
  };

  try{
    Telegram.WebApp.sendData(JSON.stringify(payload));
    showToast(isRequest ? "✅ Заявка отправлена" : "✅ Добавлено");
    if(isRequest){
      setTimeout(()=>{ try{Telegram.WebApp.close();}catch(_){ } }, 700);
    }
  }catch(e){
    console.log(e);
    alert("Не удалось отправить данные в бота");
  }
}

/* ========= search ========= */
function toggleSearch(){
  const w = $("searchWrap");
  w.classList.toggle("show");
  if(w.classList.contains("show")){
    $("searchInput").value = "";
    $("searchInput").focus();
  }
}
function clearSearch(){
  $("searchInput").value = "";
  $("searchWrap").classList.remove("show");
}
function searchProducts(){
  const q = ($("searchInput").value || "").trim().toLowerCase();
  if(!q) return;

  const found = PRODUCTS.find(p => {
    const all = [p.id,p.name,p.category,p.vol,p.abv,String(p.price)].filter(Boolean).join(" ").toLowerCase();
    return all.includes(q);
  });

  if(found){
    renderProduct(found);
    showToast("🔎 Найдено");
  }
}

/* ========= init: pick by ?item= ========= */
(function init(){
  const itemId = getParam("item");
  const p = PRODUCTS.find(x => x.id === itemId) || PRODUCTS[0] || null;
  if(!p){
    alert("Добавь товары в массив PRODUCTS");
    return;
  }
  renderProduct(p);
})();
</script>
</body>
</html>
